version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./uploads:/app/uploads
      - ./app.db:/app/app.db
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
